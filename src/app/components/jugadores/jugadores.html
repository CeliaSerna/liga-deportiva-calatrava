<!-- búsqueda de jugdores -->
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <h4 class="text-dark ms-3 mt-5 mb-4">Jugadores</h4> 

        <ul class="list-group">
           <li *ngFor="let j of jugadores">
                {{ j.id }} - {{ j.nombre }} - {{ j.equipo }}
            </li>
        </ul>
        
        <!-- Si la lista está vacía, muestra un mensaje -->
        <p *ngIf="jugadores.length === 0">Cargando jugadores...</p>
    
    </div>
</div>
