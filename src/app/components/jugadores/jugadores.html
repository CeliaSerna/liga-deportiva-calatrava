<!-- lista de jugdores -->
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <h4 class="text-dark ms-3 mt-5 mb-4">Jugadores</h4> 

        <ul class="list-group">
           <li *ngFor="let jugador of jugadores" class="list-group-item">
                <p class="w-100 text-start text-secondary">{{ jugador.nombre }} - {{ jugador.equipo }}</p>
            </li>
        </ul>
        
        <!-- Si la lista está vacía, muestra un mensaje -->
        <p *ngIf="jugadores.length === 0" class="text-center mt-3 text-muted italic">Cargando jugadores...</p>
    
    </div>
</div>
